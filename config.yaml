# === Future with Serdar — Yapılandırma ===
# Kaynaklar ve davranış ayarları burada tutulur (kolayca genişletilebilir).

podcast:
  target_words: [480, 580]     # bölüm uzunluğu ≈ 3-4 dk (kalibrasyon: ~131 kelime/dk;
                               # model hedefin altına düştüğü için üst sınır yüksek tutuldu)
  num_news: 3                  # seçilecek haber sayısı (kısa bölüm → 3)
  min_news: 2
  # Belirli bir haber feed'lerde görülürse skoruna bakılmaksızın bölüme
  # sabitlenir. Kaynak kuralı korunur: yine de gerçek bir feed makalesine
  # dayanır, uydurulmaz. Feed'lerde hiç çıkmazsa girmez. Geçici/tek seferlik
  # istekler için: haber yayınlandıktan sonra ilgili kelimeyi buradan silin.
  priority_keywords:
    - "monaco glass"
    - "monako glass"

# Podcast RSS / yayın bilgileri (Spotify/Apple için)
podcast_meta:
  language: tr
  email: guvenser09@gmail.com   # iTunes owner e-postası (Apple/Spotify zorunlu)
  category: Technology          # iTunes ana kategori
  link: https://www.youtube.com/@futurewithserdar  # kanal/web sitesi (placeholder)
  subtitle: "Her sabah, yapay zekânın son 24 saati — Türkçe."
  keywords:
    - yapay zeka
    - yapay zeka haberleri
    - AI
    - teknoloji
    - ChatGPT
    - Claude
    - üretken yapay zeka
    - günlük bülten
    - Türkçe podcast
    - teknoloji haberleri
  description: >-
    Future with Serdar, her sabah yapay zekâ dünyasının son 24 saatini Türkçe
    olarak özetleyen günlük bir bülten. Küresel AI gündeminden en önemli 3-4
    gelişmeyi seçip; ne olduğunu, neden önemli olduğunu ve en önemlisi "senin
    için ne anlama geldiğini" sade, pratik bir dille anlatıyoruz. Model
    lansmanları, yeni araçlar, yatırımlar ve Türkiye'den AI haberleri — hepsi
    6-8 dakikada, kahveni içerken.


    Bu programın kendisi de bir yapay zekâ deneyi: senaryo, ses ve yayın
    tamamen otomatik üretiliyor. Yani dinlediğin bülten, anlattığı teknolojinin
    canlı kanıtı. Yeni bölüm her gün sabah yayında — geleceği bugünden dinle.
  explicit: false

model:
  scoring: claude-sonnet-4-6   # haber önem puanlama
  script: claude-sonnet-4-6    # senaryo yazımı

voice:
  model: eleven_v3             # en doğal/expressive (A/B testte seçildi)
  output_format: mp3_44100_128
  settings:                    # 19 Haz: daha duygulu teslimat için (A/B/C testi)
    stability: 0.3             # düşük = daha ifadeli/duygulu (Creative'e yakın)
    similarity_boost: 0.75
    style: 0.35                # ifadeyi abartmadan canlandırır

collector:
  hours_lookback: 24
  dedup_threshold: 0.72        # başlık benzerliği (0-1) — üstündekiler aynı haber sayılır
  min_score: 40                # bu puanın altı seçilmez
  slow_day_threshold: 55       # en yüksek puan bunun altındaysa "yavaş gün"
  fetch_full_text: true
  max_full_text_chars: 8000
  request_timeout: 15
  per_source_limit: 25         # kaynak başına en fazla kaç başlık alınsın

# AI gündemi anahtar kelimeleri — ai_filter:true olan kaynaklarda filtre için
ai_keywords:
  - "yapay zeka"
  - "yapay zekâ"
  - " ai "
  - "ai)"
  - "(ai"
  - "a.i."
  - llm
  - gpt
  - claude
  - gemini
  - openai
  - anthropic
  - deepmind
  - mistral
  - "hugging face"
  - "machine learning"
  - "makine öğren"
  - "büyük dil model"
  - "language model"
  - "neural"
  - "chatbot"
  - "yapay zeka modeli"

# Kaynak listesi. ai_filter:true → yalnızca AI ile ilgili başlıklar tutulur.
sources:
  # Resmî bloglar
  # NOT: Anthropic'e özel Google News feed'i KALDIRILDI (19→20 Haz) — havuzu
  # Anthropic/Fable saga'sına doğru yamultuyor, her gün aynı konu seçiliyordu.
  # Anthropic haberleri zaten TechCrunch/Verge/Ars/HN üzerinden geliyor.
  - name: OpenAI
    url: https://openai.com/news/rss.xml
    category: official
  - name: Google DeepMind
    url: https://deepmind.google/blog/rss.xml
    category: official
  - name: Hugging Face
    url: https://huggingface.co/blog/feed.xml
    category: official

  # Teknoloji medyası
  - name: TechCrunch AI
    url: https://techcrunch.com/category/artificial-intelligence/feed/
    category: media
  - name: The Verge AI
    url: https://www.theverge.com/rss/ai-artificial-intelligence/index.xml
    category: media
  - name: VentureBeat AI
    url: https://venturebeat.com/category/ai/feed/
    category: media
  - name: Ars Technica
    url: https://feeds.arstechnica.com/arstechnica/index
    category: media
    ai_filter: true
  - name: MIT Tech Review AI
    url: https://www.technologyreview.com/topic/artificial-intelligence/feed
    category: media

  # Topluluk
  - name: Hacker News
    url: https://hnrss.org/frontpage?points=100
    category: community
    ai_filter: true

  # Türkiye
  - name: Webrazzi
    url: https://webrazzi.com/feed/
    category: turkey
    ai_filter: true
  - name: ShiftDelete
    url: https://shiftdelete.net/feed
    category: turkey
    ai_filter: true

  # Akademik (haftalık özet için — genelde ai_filter gerekmez, zaten cs.AI)
  - name: arXiv cs.AI
    url: http://export.arxiv.org/rss/cs.AI
    category: academic
    weekly_only: true   # günlük akışta ağırlığı düşük; ileride haftalık özet modülü kullanır
